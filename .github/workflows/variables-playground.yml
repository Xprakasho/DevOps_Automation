
name: Variables Playground

on:
  push:
  workflow_dispatch:

env:
  APP_NAME: DevOps_Automation
  ENV: Development

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: Job-App
    steps:
      - name: Print Workflow Variables
        env:
          APP_NAME: Step-Ap
        run: |
          echo "Application: $APP_NAME"
          echo "Environment: $ENV"
